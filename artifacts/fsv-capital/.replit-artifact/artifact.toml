kind = "web"
previewPath = "/"
title = "FSV Capital"
version = "1.0.0"
id = "artifacts/fsv-capital"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22366

[services.development]
run = "pnpm --filter @workspace/fsv-capital run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fsv-capital", "run", "build" ]
publicDir = "artifacts/fsv-capital/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22366"
BASE_PATH = "/"
