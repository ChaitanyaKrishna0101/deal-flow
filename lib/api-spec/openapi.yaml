        fundingRaised:
          type: number
        previousInvestors:
          type: string
        burnRate:
          type: number
        runway:
          type: number
        projectionY1:
          type: number
        projectionY2:
          type: number
        projectionY3:
          type: number
        amountRaising:
          type: number
        currency:
          type: string
        fundingStage:
          type: string
        equityOffered:
          type: number
        useOfFunds:
          type: array
          items:
            type: string
        useOfFundsDetail:
          type: string
        founderEducation:
          type: string
        founderExperience:
          type: string
        teamSize:
          type: number
        coreTeam:
          type: array
          items:
            $ref: "#/components/schemas/CoreTeamMember"
        advisors:
          type: string
        whyFSV:
          type: string
        fsvValueAdd:
          type: string
        openToMentorship:
          type: boolean
