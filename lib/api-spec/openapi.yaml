    ApplicationStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ApplicationSubmitResult:
      type: object
      required: [success, applicationId, score]
      properties:
        success:
          type: boolean
        applicationId:
          type: string
        score:
          type: number
