          type: number
        averageScore:
          type: number
        shortlisted:
          type: number
        thisMonth:
          type: number
        bySector:
          type: object
          additionalProperties:
            type: number
        byStage:
          type: object
          additionalProperties:
            type: number
        byStatus:
          type: object
